name: Build and Push to GHCR

on:
  push:
    branches: [main, master]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Updated target image repository name
  IMAGE: ghcr.io/${{ github.repository_owner }}/stream-sanitizarr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once, tag for everything we need
      - name: Build image
        run: |
          docker build \
            --label "org.opencontainers.image.title=stream-sanitizer" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .

      # Branch push → :main (or :master) + :latest
      - name: Tag branch
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
        run: |
          BRANCH=${GITHUB_REF_NAME}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${BRANCH}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest

      # Semver tag push (v1.2.3) → :1.2.3 + :1.2 + :1 + :latest
      - name: Tag semver
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}          # strip leading v
          MAJOR=${VERSION%%.*}
          MINOR=${VERSION%.*}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${VERSION}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${MINOR}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${MAJOR}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest

      # Push all local tags for this image in one shot
      - name: Push
        if: github.event_name != 'pull_request'
        run: docker push --all-tags ${{ env.IMAGE }}
