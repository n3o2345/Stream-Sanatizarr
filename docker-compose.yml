version: '3.8'

services:
  stream-sanitizer:
    build: .
    container_name: stream-sanitizer
    ports:
      - "8089:8000"
    environment:
      # --- 1. CHOOSE YOUR HARDWARE ACCELERATION CODEC ---
      - VIDEO_CODEC=h264_nvenc        # NVIDIA (Default)
      # - VIDEO_CODEC=h264_qsv        # Intel QuickSync (Uncomment to use)
      # - VIDEO_CODEC=h264_vaapi      # AMD / Generic VAAPI (Uncomment to use)
      # - VIDEO_CODEC=libx264         # CPU Software Fallback (Uncomment to use)
      
      - VIDEO_BITRATE=3000k
      - AUDIO_BITRATE=128k
      
      # --- 2. THE STABILIZER'S NETWORK ADDRESS ---
      # Replace with your actual server IP so the playlist generator builds the correct links
      - PROXY_PUBLIC_URL=http://192.168.1.50:8089 
    
    # --- 3. HARDWARE MAPPING (Choose your hardware block) ---

    # Option A: NVIDIA Pass-through (Leave uncommented if using NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]

    # Option B: Intel or AMD Direct Rendering Nodes (Uncomment below if using Intel/AMD)
    # devices:
    #   - /dev/dri:/dev/dri

    restart: unless-stopped