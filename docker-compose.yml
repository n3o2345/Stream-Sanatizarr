version: '3.8'

# NOTE: the image is now universal — it supports NVIDIA, Intel, AMD, and
# CPU-only encoding from the SAME build. You only need to edit this file
# (codec + device mapping) when switching hardware, no image rebuild needed.

services:
  stream-sanitizer:
    image: ghcr.io/n3o2345/stream-sanatizarr:latest
    container_name: stream-sanitizer
    ports:
      - "8089:8000"
    environment:
      # --- 1. CHOOSE YOUR HARDWARE ACCELERATION CODEC ---
      - VIDEO_CODEC=h264_nvenc        # NVIDIA (Default)
      # - VIDEO_CODEC=h264_qsv        # Intel QuickSync (Uncomment to use)
      # - VIDEO_CODEC=h264_vaapi      # AMD / Generic VAAPI (Uncomment to use)
      # - VIDEO_CODEC=libx264         # CPU Software Fallback (Uncomment to use)
      
      - VIDEO_BITRATE=3000k
      - AUDIO_BITRATE=128k
      
      # --- 2. THE STABILIZER'S NETWORK ADDRESS ---
      # Replace with your actual server IP so the playlist generator builds the correct links
      - PROXY_PUBLIC_URL=http://192.168.1.50:8089 
    
    # --- 3. HARDWARE MAPPING (Choose ONE block below to match VIDEO_CODEC above) ---

    # Option A: NVIDIA (h264_nvenc) — Leave uncommented if using NVIDIA.
    # Requires the NVIDIA Container Toolkit installed on the host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]

    # Option B: Intel QSV (h264_qsv) or AMD/Intel VAAPI (h264_vaapi) —
    # comment out the entire "deploy:" block above, then uncomment below.
    # devices:
    #   - /dev/dri:/dev/dri

    # Option C: CPU only (libx264) — comment out BOTH the "deploy:" block
    # above and the "devices:" block above. No hardware mapping needed.

    restart: unless-stopped